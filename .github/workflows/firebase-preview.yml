name: Firebase Hosting Preview

on:
  pull_request:

jobs:
  build_and_preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Verify zero-cost defaults
        run: npm run check:zero-cost
        working-directory: functions

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Build web app
        run: npm run build
        working-directory: web

      - name: Deploy preview
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CROWDSENSE_AI_DEV }}
          projectId: crowdsense-ai-dev
